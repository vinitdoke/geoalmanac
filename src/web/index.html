<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAlmanac</title>

    <!-- Meta/SEO -->
    <meta name="description" content="Hiking Almanac">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <main id="map-container">
            <div id="map"></div>
        </main>

        <div id="left-sidebar-container">
            <aside id="sidebar" class="floating-panel">
                <header>
                    <h1>GeoAlmanac</h1>
                    <p class="subtitle">Hiking in the neighborhood</p>
                </header>

                <div id="sidebar-content">
                    <div id="stats-summary" class="stats-grid">
                        <!-- Populated by JS -->
                    </div>

                    <div id="hikes-list" class="hike-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </aside>

            <aside id="details-panel" class="floating-panel hidden">
                <button id="close-details" class="close-btn">&times;</button>
                <div id="details-content">
                    <h2 id="detail-title">Hike Name</h2>
                    <div class="chart-container">
                        <canvas id="elevation-chart"></canvas>
                    </div>

                    <div id="album-container" class="album-container">
                        <!-- Photos populated by JS -->
                    </div>

                    <div id="detail-stats" class="stats-grid">
                        <!-- Stats populated by JS -->
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- App JS -->
    <script src="app.js" type="module"></script>
</body>

</html>
